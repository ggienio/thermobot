<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thermobot Control Panel</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #222;
        }
        .container {
            display: flex;
            gap: 20px;
            padding: 20px;
        }
        .video-stream {
            background-color: #000;
            border: 2px solid #444;
            border-radius: 8px;
            padding: 10px;
            min-width: 400px;
            min-height: 300px;
        }
        .controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
            justify-content: center;
        }
        .arrow-pad {
            display: grid;
            grid-template-columns: auto auto auto auto auto;
            gap: 10px;
            justify-items: center;
        }
        .arrow-pad button {
            width: 60px;
            height: 60px;
            font-size: 24px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .arrow-pad .empty {
            visibility: hidden;
        }
        button:hover {
            background-color: #0056b3;
        }
        button:active {
            background-color: #003d82;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="video-stream">
        </div>
        <div class="controls">
            <div class="arrow-pad">
                <button class="empty"></button>
                <button class="btn-topleft">↖</button>
                <button class="btn-forward">↑</button>
                <button class="btn-topright">↗</button>
                <button class="empty"></button>
                
                <button class="btn-rotateleft">↶</button>
                <button class="btn-left">←</button>
                <button class="btn-stop">⏹</button>
                <button class="btn-right">→</button>
                <button class="btn-rotateright">↷</button>

                <button class="empty"></button>
                <button class="btn-bottomleft">↙</button>
                <button class="btn-backward">↓</button>
                <button class="btn-bottomright">↘</button>
                <button class="empty"></button>
            </div>
        </div>
    </div>

    <script>
        const commands = {
            'btn-forward': { cmd: 'MOVE', vx: 0, vy: 1, omega: 0 },
            'btn-backward': { cmd: 'MOVE', vx: 0, vy: -1, omega: 0 },
            'btn-left': { cmd: 'MOVE', vx: -1, vy: 0, omega: 0 },
            'btn-right': { cmd: 'MOVE', vx: 1, vy: 0, omega: 0 },
            'btn-topleft': { cmd: 'MOVE', vx: -1, vy: 1, omega: 0 },
            'btn-topright': { cmd: 'MOVE', vx: 1, vy: 1, omega: 0 },
            'btn-bottomleft': { cmd: 'MOVE', vx: -1, vy: -1, omega: 0 },
            'btn-bottomright': { cmd: 'MOVE', vx: 1, vy: -1, omega: 0 },
            'btn-rotateleft': { cmd: 'MOVE', vx: 0, vy: 0, omega: -1 },
            'btn-rotateright': { cmd: 'MOVE', vx: 0, vy: 0, omega: 1 },
            'btn-stop': { cmd: 'MOVE', vx: 0, vy: 0, omega: 0 }
        };

        const ws = new WebSocket('ws://192.168.4.1/ws');

        ws.onopen = () => console.log('Connected to server');
        ws.onerror = (error) => console.error('WebSocket error:', error);

        function sendCommand(command) {
            if (ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify(command));
            }
        }

        const activeIntervals = new Map();

        document.querySelectorAll('.arrow-pad button:not(.empty)').forEach(button => {
            const className = button.className;
            const command = commands[className];

            const stopMove = () => {
                const intervalId = activeIntervals.get(button);
                if (intervalId) {
                    clearInterval(intervalId);
                    activeIntervals.delete(button);
                }
                sendCommand(commands['btn-stop']);
            };

            button.addEventListener('mousedown', () => {
                sendCommand(command);
                if (!activeIntervals.has(button)) {
                    activeIntervals.set(button, setInterval(() => sendCommand(command), 300));
                }
            });

            button.addEventListener('mouseup', stopMove);
        });

    </script>
</body>
</html>
