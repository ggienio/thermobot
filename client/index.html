<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thermobot Control Panel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="video-stream">
            <input type="checkbox" id="nav-toggle-cb">
            <label for="nav-toggle-cb" class="hamburger-btn">☰</label>
            <div id="stream-container" class="image-container hidden">
                <a id="save-still" href="#" class="button save" download="capture.jpg">Save</a>
                <div class="close" id="close-stream">×</div>
                <img id="stream" src="" crossorigin>
            </div>
            <div id="sidebar">
                <nav id="menu">

                    <section id="xclk-section" class="nothidden">
                        <div class="input-group" id="set-xclk-group">
                            <label for="set-xclk">XCLK MHz</label>
                            <div class="text">
                                <input id="xclk" type="text" minlength="1" maxlength="2" size="2" value="8">
                            </div>
                            <button class="inline-button" id="set-xclk">Set</button>
                        </div>
                    </section>

                    <div class="input-group" id="framesize-group">
                        <label for="framesize">Resolution</label>
                        <select id="framesize" class="default-action">
                            <!-- 2MP -->
                            <option value="15">UXGA(1600x1200)</option>
                            <option value="14">SXGA(1280x1024)</option>
                            <option value="13">HD(1280x720)</option>
                            <option value="12">XGA(1024x768)</option>
                            <option value="11">SVGA(800x600)</option>
                            <option value="10">VGA(640x480)</option>
                            <option value="9">HVGA(480x320)</option>
                            <option value="8">CIF(400x296)</option>
                            <!--option value="7">320x320</option--> <!-- Unsupported on ov2640 -->
                            <option value="6">QVGA(320x240)</option>
                            <option value="5">240x240</option>
                            <option value="4">HQVGA(240x176)</option>
                            <option value="3">QCIF(176x144)</option>
                            <option value="2">128x128</option>
                            <option value="1">QQVGA(160x120)</option>
                            <option value="0">96x96</option>
                        </select>
                    </div>
                    <div class="input-group" id="quality-group">
                        <label for="quality">Quality</label>
                        <div class="slider-wrapper">
                            <span class="range-min">4</span>
                            <input type="range" id="quality" min="4" max="63" value="10" class="default-action">
                            <span class="range-current" data-for="quality">10</span>
                            <span class="range-max">63</span>
                        </div>
                    </div>
                    <div class="input-group" id="brightness-group">
                        <label for="brightness">Brightness</label>
                        <div class="slider-wrapper">
                            <span class="range-min">-2</span>
                            <input type="range" id="brightness" min="-2" max="2" value="0" class="default-action">
                            <span class="range-current" data-for="brightness">0</span>
                            <span class="range-max">2</span>
                        </div>
                    </div>
                    <div class="input-group" id="contrast-group">
                        <label for="contrast">Contrast</label>
                        <div class="slider-wrapper">
                            <span class="range-min">-2</span>
                            <input type="range" id="contrast" min="-2" max="2" value="0" class="default-action">
                            <span class="range-current" data-for="contrast">0</span>
                            <span class="range-max">2</span>
                        </div>
                    </div>
                    <div class="input-group" id="saturation-group">
                        <label for="saturation">Saturation</label>
                        <div class="slider-wrapper">
                            <span class="range-min">-2</span>
                            <input type="range" id="saturation" min="-2" max="2" value="0" class="default-action">
                            <span class="range-current" data-for="saturation">0</span>
                            <span class="range-max">2</span>
                        </div>
                    </div>
                    <div class="input-group" id="special_effect-group">
                        <label for="special_effect">Special Effect</label>
                        <select id="special_effect" class="default-action">
                            <option value="0" selected="selected">No Effect</option>
                            <option value="1">Negative</option>
                            <option value="2">Grayscale</option>
                            <option value="3">Red Tint</option>
                            <option value="4">Green Tint</option>
                            <option value="5">Blue Tint</option>
                            <option value="6">Sepia</option>
                        </select>
                    </div>
                    <div class="input-group" id="awb-group">
                        <label for="awb">AWB</label>
                        <div class="switch">
                            <input id="awb" type="checkbox" class="default-action" checked="checked">
                            <label class="slider" for="awb"></label>
                        </div>
                    </div>
                    <div class="input-group" id="awb_gain-group">
                        <label for="awb_gain">AWB Gain</label>
                        <div class="switch">
                            <input id="awb_gain" type="checkbox" class="default-action" checked="checked">
                            <label class="slider" for="awb_gain"></label>
                        </div>
                    </div>
                    <div class="input-group" id="wb_mode-group">
                        <label for="wb_mode">WB Mode</label>
                        <select id="wb_mode" class="default-action">
                            <option value="0" selected="selected">Auto</option>
                            <option value="1">Sunny</option>
                            <option value="2">Cloudy</option>
                            <option value="3">Office</option>
                            <option value="4">Home</option>
                        </select>
                    </div>
                    <div class="input-group" id="aec-group">
                        <label for="aec">AEC SENSOR</label>
                        <div class="switch">
                            <input id="aec" type="checkbox" class="default-action" checked="checked">
                            <label class="slider" for="aec"></label>
                        </div>
                    </div>
                    <div class="input-group" id="aec2-group">
                        <label for="aec2">AEC DSP</label>
                        <div class="switch">
                            <input id="aec2" type="checkbox" class="default-action" checked="checked">
                            <label class="slider" for="aec2"></label>
                        </div>
                    </div>
                    <div class="input-group" id="ae_level-group">
                        <label for="ae_level">AE Level</label>
                        <div class="slider-wrapper">
                            <span class="range-min">-2</span>
                            <input type="range" id="ae_level" min="-2" max="2" value="0" class="default-action">
                            <span class="range-current" data-for="ae_level">0</span>
                            <span class="range-max">2</span>
                        </div>
                    </div>
                    <div class="input-group" id="aec_value-group">
                        <label for="aec_value">Exposure</label>
                        <div class="slider-wrapper">
                            <span class="range-min">0</span>
                            <input type="range" id="aec_value" min="0" max="1200" value="204" class="default-action">
                            <span class="range-current" data-for="aec_value">204</span>
                            <span class="range-max">1200</span>
                        </div>
                    </div>
                    <div class="input-group" id="agc-group">
                        <label for="agc">AGC</label>
                        <div class="switch">
                            <input id="agc" type="checkbox" class="default-action" checked="checked">
                            <label class="slider" for="agc"></label>
                        </div>
                    </div>
                    <div class="input-group hidden" id="agc_gain-group">
                        <label for="agc_gain">Gain</label>
                        <div class="slider-wrapper">
                            <span class="range-min">1x</span>
                            <input type="range" id="agc_gain" min="0" max="30" value="5" class="default-action">
                            <span class="range-current" data-for="agc_gain">5</span>
                            <span class="range-max">31x</span>
                        </div>
                    </div>
                    <div class="input-group" id="gainceiling-group">
                        <label for="gainceiling">Gain Ceiling</label>
                        <div class="slider-wrapper">
                            <span class="range-min">2x</span>
                            <input type="range" id="gainceiling" min="0" max="6" value="0" class="default-action">
                            <span class="range-current" data-for="gainceiling">0</span>
                            <span class="range-max">128x</span>
                        </div>
                    </div>
                    <div class="input-group" id="bpc-group">
                        <label for="bpc">BPC</label>
                        <div class="switch">
                            <input id="bpc" type="checkbox" class="default-action">
                            <label class="slider" for="bpc"></label>
                        </div>
                    </div>
                    <div class="input-group" id="wpc-group">
                        <label for="wpc">WPC</label>
                        <div class="switch">
                            <input id="wpc" type="checkbox" class="default-action" checked="checked">
                            <label class="slider" for="wpc"></label>
                        </div>
                    </div>
                    <div class="input-group" id="raw_gma-group">
                        <label for="raw_gma">Raw GMA</label>
                        <div class="switch">
                            <input id="raw_gma" type="checkbox" class="default-action" checked="checked">
                            <label class="slider" for="raw_gma"></label>
                        </div>
                    </div>
                    <div class="input-group" id="lenc-group">
                        <label for="lenc">Lens Correction</label>
                        <div class="switch">
                            <input id="lenc" type="checkbox" class="default-action" checked="checked">
                            <label class="slider" for="lenc"></label>
                        </div>
                    </div>
                    <div class="input-group" id="hmirror-group">
                        <label for="hmirror">H-Mirror</label>
                        <div class="switch">
                            <input id="hmirror" type="checkbox" class="default-action" checked="checked">
                            <label class="slider" for="hmirror"></label>
                        </div>
                    </div>
                    <div class="input-group" id="vflip-group">
                        <label for="vflip">V-Flip</label>
                        <div class="switch">
                            <input id="vflip" type="checkbox" class="default-action" checked="checked">
                            <label class="slider" for="vflip"></label>
                        </div>
                    </div>
                    <div class="input-group" id="dcw-group">
                        <label for="dcw">DCW (Downsize EN)</label>
                        <div class="switch">
                            <input id="dcw" type="checkbox" class="default-action" checked="checked">
                            <label class="slider" for="dcw"></label>
                        </div>
                    </div>
                    <div class="input-group" id="colorbar-group">
                        <label for="colorbar">Color Bar</label>
                        <div class="switch">
                            <input id="colorbar" type="checkbox" class="default-action">
                            <label class="slider" for="colorbar"></label>
                        </div>
                    </div>
                    <div class="input-group" id="led-group">
                        <label for="led_intensity">LED Intensity</label>
                        <div class="slider-wrapper">
                            <span class="range-min">0</span>
                            <input type="range" id="led_intensity" min="0" max="255" value="0" class="default-action">
                            <span class="range-current" data-for="led_intensity">0</span>
                            <span class="range-max">255</span>
                        </div>
                    </div>
                    <section id="buttons">
                        <button id="get-still">Get Still</button>
                        <button id="toggle-stream">Start Stream</button>
                    </section>

                    <div style="margin-top: 8px;"><center><span style="font-weight: bold;">Advanced Settings</span></center></div>
                    <hr style="width:100%">
                    <input type="checkbox" id="nav-toggle-reg" class="hidden toggle-section-button">
                    <label for="nav-toggle-reg" class="toggle-section-label">Register Get/Set</label>
                    <section class="toggle-section">
                        <!--h4>Set Register</h4-->
                        <div class="input-group" id="set-reg-group">
                            <label for="set-reg">Reg, Mask, Value</label>
                            <div class="text">
                                <input id="reg-addr" type="text" minlength="4" maxlength="6" size="6" value="0x111">
                            </div>
                            <div class="text">
                                <input id="reg-mask" type="text" minlength="4" maxlength="4" size="4" value="0x80">
                            </div>
                            <div class="text">
                                <input id="reg-value" type="text" minlength="4" maxlength="4" size="4" value="0x80">
                            </div>
                            <button class="inline-button" id="set-reg">Set</button>
                        </div>
                        <hr style="width:50%">
                        <!--h4>Get Register</h4-->
                        <div class="input-group" id="get-reg-group">
                            <label for="get-reg">Reg, Mask</label>
                            <div class="text">
                                <input id="get-reg-addr" type="text" minlength="4" maxlength="6" size="6" value="0x111">
                            </div>
                            <div class="text">
                                <input id="get-reg-mask" type="text" minlength="4" maxlength="6" size="6" value="0x80">
                            </div>
                            <button class="inline-button" id="get-reg">Get</button>
                        </div>
                        <div class="input-group">
                            <label for="get-reg-value">Value</label>
                            <div class="text">
                                <span id="get-reg-value">0x1234</span>
                            </div>
                        </div>
                    </section>
                    <hr style="width:100%">
                    <input type="checkbox" id="nav-toggle-2640pll" class="hidden toggle-section-button">
                    <label for="nav-toggle-2640pll" class="toggle-section-label">CLK</label>
                    <section class="toggle-section">

                        <div class="input-group"><label for="2640pll1">CLK 2X</label><div class="switch"><input id="2640pll1" type="checkbox" class="reg-action" reg="0x111" offset="7" mask="0x01"><label class="slider" for="2640pll1"></label></div></div>

                        <div class="input-group"><label for="2640pll3">CLK DIV</label><div class="text">0<input id="2640pll3" type="text" minlength="1" maxlength="2" size="2" value="1" class="reg-action" reg="0x111" offset="0" mask="0x3f">63</div></div>
                        <div class="input-group"><label for="2640pll5">Auto PCLK</label><div class="switch"><input id="2640pll5" type="checkbox" class="reg-action" reg="0xd3" offset="7" mask="0x01"><label class="slider" for="2640pll5"></label></div></div>
                        <div class="input-group"><label for="2640pll4">PCLK DIV</label><div class="text">0<input id="2640pll4" type="text" minlength="1" maxlength="3" size="3" value="4" class="reg-action" reg="0xd3" offset="0" mask="0x7f">127</div></div>

                    </section>
                    <hr style="width:100%">
                    <input type="checkbox" id="nav-toggle-win" class="hidden toggle-section-button">
                    <label for="nav-toggle-win" class="toggle-section-label">Window</label>
                    <section class="toggle-section">

                        <div class="input-group">
                            <label for="start-x">Sensor Resolution</label><select id="start-x">
                                <option value="2">CIF (400x296)</option>
                                <option value="1">SVGA (800x600)</option>
                                <option value="0" selected="selected">UXGA (1600x1200)</option>
                            </select>
                        </div>

                        <div class="input-group" id="set-offset-res-group">
                            <label for="offset-x">Offset</label>
                            <div class="text">
                                X:<input id="offset-x" type="text" minlength="1" maxlength="3" size="6" value="400">
                            </div>
                            <div class="text">
                                Y:<input id="offset-y" type="text" minlength="1" maxlength="3" size="6" value="300">
                            </div>
                        </div>
                        <div class="input-group" id="set-total-res-group">
                            <label for="total-x">Window Size</label>
                            <div class="text">
                                X:<input id="total-x" type="text" minlength="1" maxlength="4" size="6" value="800">
                            </div>
                            <div class="text">
                                Y:<input id="total-y" type="text" minlength="1" maxlength="4" size="6" value="600">
                            </div>
                        </div>
                        <div class="input-group" id="set-output-res-group">
                            <label for="output-x">Output Size</label>
                            <div class="text">
                                X:<input id="output-x" type="text" minlength="1" maxlength="4" size="6" value="320">
                            </div>
                            <div class="text">
                                Y:<input id="output-y" type="text" minlength="1" maxlength="4" size="6" value="240">
                            </div>
                        </div>
                        <button id="set-resolution">Set Resolution</button>
                    </section>



                </nav>
            </div>
        </div>
        <div class="controls">
            <div class="arrow-pad">
                <button class="empty"></button>
                <button class="btn-topleft">↖</button>
                <button class="btn-forward">↑</button>
                <button class="btn-topright">↗</button>
                <button class="empty"></button>
                
                <button class="btn-rotateleft">↶</button>
                <button class="btn-left">←</button>
                <button class="btn-stop">⏹</button>
                <button class="btn-right">→</button>
                <button class="btn-rotateright">↷</button>

                <button class="empty"></button>
                <button class="btn-bottomleft">↙</button>
                <button class="btn-backward">↓</button>
                <button class="btn-bottomright">↘</button>
                <button class="empty"></button>
            </div>
        </div>
    </div>

    <script>
        const commands = {
            'btn-forward': { cmd: 'MOVE', vx: 0, vy: 1, omega: 0 },
            'btn-backward': { cmd: 'MOVE', vx: 0, vy: -1, omega: 0 },
            'btn-left': { cmd: 'MOVE', vx: -1, vy: 0, omega: 0 },
            'btn-right': { cmd: 'MOVE', vx: 1, vy: 0, omega: 0 },
            'btn-topleft': { cmd: 'MOVE', vx: -1, vy: 1, omega: 0 },
            'btn-topright': { cmd: 'MOVE', vx: 1, vy: 1, omega: 0 },
            'btn-bottomleft': { cmd: 'MOVE', vx: -1, vy: -1, omega: 0 },
            'btn-bottomright': { cmd: 'MOVE', vx: 1, vy: -1, omega: 0 },
            'btn-rotateleft': { cmd: 'MOVE', vx: 0, vy: 0, omega: -1 },
            'btn-rotateright': { cmd: 'MOVE', vx: 0, vy: 0, omega: 1 },
            'btn-stop': { cmd: 'MOVE', vx: 0, vy: 0, omega: 0 }
        };

        const ws = new WebSocket('ws://192.168.4.1/ws');

        ws.onopen = () => console.log('Connected to server');
        ws.onerror = (error) => console.error('WebSocket error:', error);

        function sendCommand(command) {
            if (ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify(command));
            }
        }

        const activeIntervals = new Map();

        document.querySelectorAll('.arrow-pad button:not(.empty)').forEach(button => {
            const className = button.className;
            const command = commands[className];

            const stopMove = () => {
                const intervalId = activeIntervals.get(button);
                if (intervalId) {
                    clearInterval(intervalId);
                    activeIntervals.delete(button);
                }
                sendCommand(commands['btn-stop']);
            };

            button.addEventListener('mousedown', () => {
                sendCommand(command);
                if (!activeIntervals.has(button)) {
                    activeIntervals.set(button, setInterval(() => sendCommand(command), 300));
                }
            });

            button.addEventListener('mouseup', stopMove);
        });

    </script>

    <!-- Camera stream handling script-->
    <script src="camerastream.js"></script>
</body>
</html>
